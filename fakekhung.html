// load skin
function loadSkin(){
  let t = document.getElementById("tuong").value;
  let s = document.getElementById("skin");

  s.innerHTML = "";

  if(!skins[t] || skins[t].length === 0){
    let op = document.createElement("option");
    op.text = "Chưa có skin";
    op.value = "";
    s.add(op);
    return;
  }

  skins[t].forEach(sk=>{
    let op = document.createElement("option");
    op.text = sk.name;
    op.value = sk.file;
    s.add(op);
  });
}

phuhieuImg.src = "phuhieu/" + phuhieu.value;
ssmImg.src = "ssm/" + ssm.value;

  }

  if(vienvang.checked){

  }
  if(skin.value === "") return;
}

// tải ảnh
function taiAnh(){
  let c = canvas;
  let ctx = c.getContext("2d");

  c.width=300;
  c.height=300;

  let imgs = [anh, hero, trikiImg, rankImg, phepImg, phuhieuImg, ssmImg, khung];

  imgs.forEach(img=>{
    if(img.src) ctx.drawImage(img,0,0,300,300);
  });

  ctx.fillStyle = vienvang.checked ? "yellow" : "white";
  ctx.textAlign="center";
  ctx.font="20px Arial";
  ctx.fillText(ten.value,150,150);

  if(triki.value!=""){
    ctx.fillStyle="yellow";
    ctx.fillText("Lv "+level.value,230,280);
  }

  let link=document.createElement("a");
  link.download="fake.png";
  link.href=c.toDataURL();
  link.click();
}
